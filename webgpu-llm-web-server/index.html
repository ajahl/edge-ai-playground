<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebGPU LLM Chat</title>
    <script>
      webLLMGlobal = {};
    </script>
  </head>
  <body>
    <main class="app">
      <aside class="sidebar">

        <section class="panel">
          <label class="field">
            <span>Loadable Models</span>
            <select id="model-select"></select>
          </label>

          <div class="actions">
            <button id="load-model-button" type="button" class="primary">Load Model</button>
          </div>

          <div class="status-grid">
            <div>
              <span class="status-label">Progress</span>
              <div class="progress-track" aria-hidden="true">
                <div id="progress-bar" class="progress-bar"></div>
              </div>
            </div>
            <div>
              <span class="status-label">Model</span>
              <span id="model-status">not loaded</span>
            </div>
            <div>
              <span class="status-label">State</span>
              <span id="sw-status">starting</span>
            </div>
            <div>
              <span class="status-label">Progress Text</span>
              <span id="progress-status">idle</span>
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="field">
            <span>Storage</span>
            <span id="storage-usage">checking...</span>
          </div>

          <div class="actions">
            <button id="refresh-storage-button" type="button">Refresh Storage</button>
            <button id="clear-storage-button" type="button">Clear Storage</button>
          </div>
        </section>

        <section class="panel">
          <div class="status-stack">
            <span class="status-label">Cached Models</span>
            <div id="cached-models">checking...</div>
          </div>
        </section>

        <section class="panel">
          <div class="status-stack">
            <span class="status-label">Service API</span>
            <code>/v1/models</code>
            <code>/v1/load</code>
            <code>/v1/chat/completions</code>
            <code>/v1/url-context</code>
          </div>
        </section>

        <!-- <section class="panel">
          <div class="panel-heading">
            <h2>Same-Origin Example</h2>
          </div>
          <pre class="api-example">const response = await fetch("/v1/chat/completions", {
  method: "POST",
  headers: { "Content-Type": "application/json" },
  body: JSON.stringify({
    model: "Qwen2.5-Coder-3B-Instruct-q4f16_1-MLC",
    messages: [{ role: "user", content: "Hello!" }]
  })
});</pre>
        </section> -->
      </aside>

      <section class="main-pane">
        <header class="chat-header">
          <h2>Conversation</h2>
        </header>

        <div class="transcript-wrap">
          <div id="response-output" class="conversation"></div>
        </div>

        <div id="composer" class="composer">
          <div class="composer-card">
            <div class="composer-actions">
              <span id="attached-url-status" class="status-label">No URL attached</span>
              <div class="actions">
                <button id="clear-url-button" type="button">Clear URL</button>
              </div>
            </div>

            <div id="attached-url-preview" class="attached-url-preview">No page content loaded.</div>

            <label class="field">
              <span>Message</span>
              <textarea
                id="prompt"
                rows="4"
                placeholder="Ask the local model something useful..."
              >Write a short haiku about local-first AI.</textarea>
            </label>

            <div class="composer-actions">
              <span class="status-label">Paste a URL into the message to attach page context automatically.</span>
              <div class="actions">
                <button id="stop-button" type="button">Stop</button>
                <button id="clear-chat-button" type="button">Clear Chat</button>
                <button id="run-button" type="button" class="primary">Send</button>
              </div>
            </div>
          </div>
        </div>
      </section>

      <script type="module" src="/src/main.ts"></script>
    </main>
  </body>
</html>
