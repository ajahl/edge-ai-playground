<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chromium WebGPU LLM with OpenAI API</title>
    <script>
      webLLMGlobal = {};
    </script>
    <style>
      :root {
        color-scheme: light;
        font-family: "SF Mono", "Monaco", monospace;
        background: #f5efe4;
        color: #1d1d1d;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, #bdff8a, transparent 35%),
          linear-gradient(180deg, #ebf8ea 0%, #e9efcf 100%);
      }
      main {
        max-width: 780px;
        margin: 0 auto;
        padding: 28px 20px 40px;
      }
      .card {
        margin-top: 18px;
        padding: 16px;
        border: 1px solid #1d1d1d;
        border-radius: 12px;
        background: rgba(255, 252, 247, 0.86);
        box-shadow: 8px 8px 0 #1d1d1d;
      }
      pre {
        margin: 0;
        white-space: pre-wrap;
      }
      code {
        background: rgba(29, 29, 29, 0.08);
        padding: 2px 6px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Chromium WebGPU LLM with OpenAI API</h1>
      <div class="card">
        <div>Renderer: <span id="renderer-status">starting</span></div>
        <div>Model: <span id="model-status">not loaded</span></div>
        <div>Progress: <span id="progress-status">idle</span></div>
        <div>Bridge API: <code>http://127.0.0.1:3890</code></div>
      </div>
      <div class="card">
        <pre id="log-output">Waiting for Puppeteer ...</pre>
      </div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
